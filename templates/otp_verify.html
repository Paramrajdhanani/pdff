{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="row justify-content-center align-items-center py-5 min-vh-75">
    <div class="col-md-5">
        <div class="glass-panel floating-card position-relative p-4" style="border-radius: 16px; border-color: rgba(0, 229, 255, 0.25); background: rgba(7, 11, 20, 0.55); box-shadow: 0 0 35px rgba(0, 229, 255, 0.1);">
            
            <div class="text-center mb-4">
                <i class="fa-solid fa-shield-halved text-cyan fa-2x mb-3" style="filter: drop-shadow(0 0 8px var(--neon-cyan));"></i>
                <h3 class="text-white font-monospace text-uppercase">OTP Grid Lock</h3>
                <p class="text-muted small font-monospace">VERIFY SECURE DEVICE CREDENTIALS</p>
            </div>

            <!-- Development Sandbox Notice showing mock OTP -->
            <div class="alert alert-cyber alert-cyber-warning text-start mb-4 py-2 px-3">
                <div class="d-flex align-items-center">
                    <i class="fa-solid fa-circle-exclamation text-cyan me-2"></i>
                    <span class="small text-muted">
                        <strong class="text-cyan">SANDBOX NOTIFICATION:</strong> Use simulated verification code <strong class="text-white font-monospace">{{ mock_otp }}</strong> to initialize registration.
                    </span>
                </div>
            </div>

            <form method="POST" action="{% url 'accounts:otp_verify' %}">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label class="form-label text-muted small font-monospace text-uppercase text-center d-block">6-Digit Verification Token</label>
                    <input type="text" name="otp_code" class="form-control bg-transparent text-white border-secondary border-opacity-25 text-center font-monospace fs-4 tracking-wider" placeholder="000000" maxlength="6" required>
                </div>

                <button type="submit" class="btn btn-cyber btn-cyber-cyan text-dark fw-bold w-100 py-2">
                    <i class="fa-solid fa-circle-check me-2"></i> Confirm Token
                </button>
            </form>
            
        </div>
    </div>
</div>
{% endblock %}
