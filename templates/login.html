{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="row justify-content-center align-items-center py-5 min-vh-75">
    <div class="col-md-5">
        <div class="glass-panel glowing-border-gradient floating-card position-relative p-4" style="border-radius: 16px; border-width: 1.5px; background: rgba(7, 11, 20, 0.7); box-shadow: 0 0 35px rgba(0, 229, 255, 0.15);">
            
            <!-- Corner Brackets -->
            <div class="position-absolute" style="top: -2px; left: -2px; width: 25px; height: 25px; border-top: 2px solid var(--neon-cyan); border-left: 2px solid var(--neon-cyan); border-radius: 16px 0 0 0; pointer-events: none;"></div>
            <div class="position-absolute" style="bottom: -2px; right: -2px; width: 25px; height: 25px; border-bottom: 2px solid var(--neon-purple); border-right: 2px solid var(--neon-purple); border-radius: 0 0 16px 0; pointer-events: none;"></div>
            
            <div class="text-center mb-4">
                <i class="fa-solid fa-right-to-bracket text-cyan fa-2x mb-3 fa-beat-fade" style="--fa-animation-duration: 3s; filter: drop-shadow(0 0 8px var(--neon-cyan));"></i>
                <h3 class="text-white font-monospace text-uppercase">Portal Authentication</h3>
                <p class="text-muted small font-monospace">ACCESS COGNITIVE NODE GRID</p>
            </div>

            <form method="POST" action="{% url 'accounts:login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
                {% csrf_token %}
                
                <!-- Identifier Input -->
                <div class="form-floating-cyber">
                    <input type="text" name="email" id="emailInput" placeholder=" " required autocomplete="username">
                    <label for="emailInput">Identity key (Username or Email)</label>
                </div>

                <!-- Password Input -->
                <div class="form-floating-cyber">
                    <input type="password" name="password" id="passwordInput" placeholder=" " required autocomplete="current-password">
                    <label for="passwordInput">Pass-Key</label>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4 font-monospace" style="font-size: 0.8rem;">
                    <div class="form-check text-muted">
                        <input type="checkbox" class="form-check-input bg-transparent border-secondary border-opacity-50" id="rememberMe">
                        <label class="form-check-label select-none" for="rememberMe" style="user-select: none;">Persist Lock</label>
                    </div>
                    <a href="#" class="text-cyan text-decoration-none">Forgotten Keys?</a>
                </div>

                <button type="submit" class="btn btn-cyber btn-cyber-cyan text-dark fw-bold w-100 py-2">
                    <i class="fa-solid fa-right-to-bracket me-2"></i> Initialize Lock
                </button>
            </form>

            <div class="text-center mt-4 pt-3 border-top border-secondary border-opacity-25">
                <span class="text-muted small font-monospace">Identity unlisted?</span>
                <a href="{% url 'accounts:signup' %}" class="text-purple small text-decoration-none ms-2 font-monospace">Initialize Register</a>
            </div>
            
        </div>
    </div>
</div>
{% endblock %}
