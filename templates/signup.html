{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="row justify-content-center align-items-center py-5 min-vh-75">
    <div class="col-md-5">
        <div class="glass-panel glowing-border-gradient floating-card position-relative p-4" style="border-radius: 16px; border-width: 1.5px; background: rgba(7, 11, 20, 0.7); box-shadow: 0 0 35px rgba(0, 229, 255, 0.15);">
            
            <!-- Corner Brackets -->
            <div class="position-absolute" style="top: -2px; left: -2px; width: 25px; height: 25px; border-top: 2px solid var(--neon-cyan); border-left: 2px solid var(--neon-cyan); border-radius: 16px 0 0 0; pointer-events: none;"></div>
            <div class="position-absolute" style="bottom: -2px; right: -2px; width: 25px; height: 25px; border-bottom: 2px solid var(--neon-purple); border-right: 2px solid var(--neon-purple); border-radius: 0 0 16px 0; pointer-events: none;"></div>
            
            <div class="text-center mb-4">
                <i class="fa-solid fa-user-plus text-purple fa-2x mb-3 fa-beat-fade" style="--fa-animation-duration: 3s; filter: drop-shadow(0 0 8px var(--neon-purple));"></i>
                <h3 class="text-white font-monospace text-uppercase">Register Identity</h3>
                <p class="text-muted small font-monospace">INITIALIZE NEW CORES ACCESS</p>
            </div>

            <form method="POST" action="{% url 'accounts:signup' %}">
                {% csrf_token %}
                
                <!-- Username -->
                <div class="form-floating-cyber">
                    <input type="text" name="username" id="usernameInput" placeholder=" " required autocomplete="username">
                    <label for="usernameInput">Username</label>
                </div>

                <!-- Email -->
                <div class="form-floating-cyber">
                    <input type="email" name="email" id="emailInput" placeholder=" " required autocomplete="email">
                    <label for="emailInput">Email</label>
                </div>

                <!-- Password -->
                <div class="form-floating-cyber">
                    <input type="password" name="password" id="passwordInput" placeholder=" " required autocomplete="new-password">
                    <label for="passwordInput">Secure Pass-Key</label>
                </div>

                <!-- Confirm Password -->
                <div class="form-floating-cyber">
                    <input type="password" name="confirm_password" id="confirmPasswordInput" placeholder=" " required autocomplete="new-password">
                    <label for="confirmPasswordInput">Verify Pass-Key</label>
                </div>

                <button type="submit" class="btn btn-cyber btn-cyber-cyan text-dark fw-bold w-100 py-2">
                    <i class="fa-solid fa-user-plus me-2"></i> Deploy Key System
                </button>
            </form>

            <div class="text-center mt-4 pt-3 border-top border-secondary border-opacity-25">
                <span class="text-muted small font-monospace">Already have registered keys?</span>
                <a href="{% url 'accounts:login' %}" class="text-cyan small text-decoration-none ms-2 font-monospace">Portal Authentication</a>
            </div>
            
        </div>
    </div>
</div>
{% endblock %}
